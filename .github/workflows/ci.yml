name: CI

on:
  workflow_dispatch:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    name: Validate manifests & run tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Validate every example manifest
        run: python tools/validate_manifest.py --all

      - name: Run manifest validator test suite
        run: python -m tests.test_validator

      - name: Run Blender-contract test suite (pure Python only)
        run: python -m tests.test_blender_manifest_contract

      - name: Run asset-readiness wrapper suite (pure Python only)
        run: python -m tests.test_check_asset_ready

      - name: Run galley-fixture suite (generator determinism + end-to-end)
        run: python -m tests.test_galley_fixture

      - name: Run asset-acceptance suite (fixture-swap metadata)
        run: python -m tests.test_asset_acceptance

      - name: Run candidate-asset suite (candidate workflow)
        run: python -m tests.test_candidate_asset

      - name: Run candidate-generator suite (strict manifest parsing)
        run: python -m tests.test_create_galley_candidate

      - name: Run candidate-review suite (candidate review metadata)
        run: python -m tests.test_candidate_review

      - name: Run candidate-visual-audit suite (visual audit metadata)
        run: python -m tests.test_candidate_visual_audit

      - name: Run render-evidence suite (local render procedure metadata)
        run: python -m tests.test_render_evidence

      - name: Run human-visual-review suite (review observations metadata)
        run: python -m tests.test_human_visual_review

      - name: Run Fusion parameter-map suite (pure Python dry-run)
        run: python -m tests.test_fusion_parameter_map

      - name: Run Fusion skeleton suite (pure Python only)
        run: python -m tests.test_fusion_skeleton

      - name: Run Fusion panel-math suite (pure Python only)
        run: python -m tests.test_fusion_panel_math

      - name: Run Fusion geometry-plan suite (pure Python only)
        run: python -m tests.test_fusion_geometry_plan

      - name: Run Fusion geometry-execution skeleton suite (pure Python only)
        run: python -m tests.test_fusion_geometry_execution_skeleton

      - name: Run Fusion local-availability suite (pure Python only)
        run: python -m tests.test_fusion_local_availability

      - name: Run Fusion MCP bridge suite (pure Python only)
        run: python -m tests.test_fusion_mcp_bridge

      - name: Run Fusion MCP opt-in docs suite (pure Python only)
        run: python -m tests.test_fusion_mcp_opt_in_docs

      - name: Run Fusion MCP bridge smoke helper (pure Python only)
        run: python tools/mcp/smoke_fusion_bridge.py

      - name: Run runtime-consumer suite (manifest read as typed data)
        run: python -m tests.test_runtime_consumer

      - name: Run package-report suite (catalog readiness)
        run: python -m tests.test_package_report

      - name: Run handoff-ready suite (extraction-readiness helper)
        run: python -m tests.test_handoff_ready

      - name: Run API health suite (FastAPI skeleton)
        run: python -m tests.test_api_health

      - name: Run API modules suite (catalog + detail endpoints)
        run: python -m tests.test_api_modules

      - name: Run API build-status suite (aggregate readiness)
        run: python -m tests.test_api_build_status

      - name: Run handoff-ready CLI (static-only mode)
        run: python tools/handoff/check_handoff_ready.py

      - name: Run asset-readiness CLI on current manifest asset
        run: python tools/blender/check_asset_ready.py --manifest examples/galley_1000.json

      - name: Run asset-acceptance metadata CLI
        run: python tools/assets/validate_asset_acceptance.py

      - name: Run candidate-asset metadata CLI
        run: python tools/assets/validate_candidate_asset.py

      - name: Run candidate-review metadata CLI
        run: python tools/assets/validate_candidate_review.py

      - name: Run candidate-visual-audit metadata CLI
        run: python tools/assets/validate_candidate_visual_audit.py

      - name: Run render-evidence metadata CLI
        run: python tools/assets/validate_render_evidence.py

      - name: Run human-visual-review metadata CLI
        run: python tools/assets/validate_human_visual_review.py

      - name: Run Fusion parameter-map metadata CLI
        run: python tools/fusion/validate_fusion_parameter_map.py

      - name: Run Fusion payload skeleton CLI
        run: python tools/fusion/check_fusion_payload.py tests/fixtures/galley_1000_fusion_parameters.expected.json

      - name: Run Fusion panel-math export CLI
        run: python tools/fusion/export_galley_v1_panels.py --payload tests/fixtures/galley_1000_fusion_parameters.expected.json --out /tmp/galley_1000_panels.json

      - name: Run Fusion geometry-plan CLI
        run: python tools/fusion/check_fusion_geometry_plan.py tests/fixtures/galley_1000_panels.expected.json

      - name: Run Fusion geometry dry-run CLI
        run: python tools/fusion/fusion_create_galley_v1.py --dry-run tests/fixtures/galley_1000_panels.expected.json

  web:
    name: Build frontend (web/)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies (clean, from lockfile)
        run: npm ci

      - name: TypeScript check
        run: npm run typecheck

      - name: Vite build (also runs tsc --noEmit)
        run: npm run build
