name: CI

on:
  workflow_dispatch:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    name: Validate manifests & run tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install --upgrade pip jsonschema

      - name: Validate every example manifest
        run: python tools/validate_manifest.py --all

      - name: Run manifest validator test suite
        run: python -m tests.test_validator

      - name: Run Blender-contract test suite (pure Python only)
        run: python -m tests.test_blender_manifest_contract

      - name: Run asset-readiness wrapper suite (pure Python only)
        run: python -m tests.test_check_asset_ready

      - name: Run galley-fixture suite (generator determinism + end-to-end)
        run: python -m tests.test_galley_fixture

      - name: Run asset-acceptance suite (fixture-swap metadata)
        run: python -m tests.test_asset_acceptance

      - name: Run candidate-asset suite (candidate workflow)
        run: python -m tests.test_candidate_asset

      - name: Run candidate-review suite (candidate review metadata)
        run: python -m tests.test_candidate_review

      - name: Run candidate-visual-audit suite (visual audit metadata)
        run: python -m tests.test_candidate_visual_audit

      - name: Run render-evidence suite (local render procedure metadata)
        run: python -m tests.test_render_evidence

      - name: Run runtime-consumer suite (manifest read as typed data)
        run: python -m tests.test_runtime_consumer

      - name: Run package-report suite (catalog readiness)
        run: python -m tests.test_package_report

      - name: Run handoff-ready suite (extraction-readiness helper)
        run: python -m tests.test_handoff_ready

      - name: Run handoff-ready CLI (static-only mode)
        run: python tools/handoff/check_handoff_ready.py

      - name: Run asset-readiness CLI on current manifest asset
        run: python tools/blender/check_asset_ready.py --manifest examples/galley_1000.json

      - name: Run asset-acceptance metadata CLI
        run: python tools/assets/validate_asset_acceptance.py

      - name: Run candidate-asset metadata CLI
        run: python tools/assets/validate_candidate_asset.py

      - name: Run candidate-review metadata CLI
        run: python tools/assets/validate_candidate_review.py

      - name: Run candidate-visual-audit metadata CLI
        run: python tools/assets/validate_candidate_visual_audit.py

      - name: Run render-evidence metadata CLI
        run: python tools/assets/validate_render_evidence.py
