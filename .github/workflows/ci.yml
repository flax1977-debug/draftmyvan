name: CI

on:
  workflow_dispatch:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    name: Validate manifests & run tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install --upgrade pip jsonschema

      - name: Validate every example manifest
        run: python tools/validate_manifest.py --all

      - name: Validate every asset-acceptance metadata file
        run: python tools/assets/validate_asset_acceptance.py --all

      - name: Run manifest validator test suite
        run: python -m tests.test_validator

      - name: Run Blender-contract test suite (pure Python only)
        run: python -m tests.test_blender_manifest_contract

      - name: Run asset-readiness wrapper suite (pure Python only)
        run: python -m tests.test_check_asset_ready

      - name: Run galley-fixture suite (generator determinism + end-to-end)
        run: python -m tests.test_galley_fixture

      - name: Run runtime-consumer suite (manifest read as typed data)
        run: python -m tests.test_runtime_consumer

      - name: Run package-report suite (catalog readiness)
        run: python -m tests.test_package_report

      - name: Run handoff-ready suite (extraction-readiness helper)
        run: python -m tests.test_handoff_ready

      - name: Run asset-acceptance suite (acceptance metadata validator)
        run: python -m tests.test_asset_acceptance

      - name: Run handoff-ready CLI (static-only mode)
        run: python tools/handoff/check_handoff_ready.py

      - name: Run asset-readiness CLI on committed manifest asset
        run: python tools/blender/check_asset_ready.py --manifest examples/galley_1000.json
